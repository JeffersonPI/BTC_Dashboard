<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
<style>
body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
}

/* CARD STYLE */
.card {
    background: linear-gradient(135deg, #020617, #111827);
    padding: 18px 20px;
    border-radius: 16px;
    box-shadow: 
        0 6px 25px rgba(0,0,0,0.6),
        0 0 10px rgba(59,130,246,0.15);
    margin-bottom: 12px;
    transition: 0.3s ease;
}

/* Hover effect */
.card:hover {
    transform: translateY(-3px);
    box-shadow: 
        0 10px 30px rgba(0,0,0,0.8),
        0 0 15px rgba(59,130,246,0.3);
}

/* Title */
.title {
    color: #f9fafb;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* Subtitle */
.subtitle {
    color: #9ca3af;
    font-size: 13px;
    margin-top: 5px;
}

/* Divider */
.divider {
    height: 1px;
    background: rgba(255,255,255,0.05);
    margin: 10px 0;
}

body {
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="card">
    <div class="title"> BTC Trading Dashboard</div>
    <div class="subtitle">Real-time Prediction - On-chain - Trading Simulation</div>
</div>

<!-- SECTION LABEL -->
<div class="card">
    <div class="title">📈 Market Chart</div>
    <div class="divider"></div>
    <div class="subtitle">Price movement and trading signals</div>
</div>

</body>
</html>
